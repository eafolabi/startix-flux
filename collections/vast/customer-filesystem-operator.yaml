---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: filesystem-operator
  namespace: customer-operators
spec:
  interval: 60m0s
  # yamllint disable-line rule:line-length
  url: oci://harbor.harbor/ghcr.io/gc-private/b2-docker-image-filesystem-operator/filesystem-operator-flux
  insecure: true
  ref:
    tag: ${filesystem_operator_flux:=0.1.0}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: filesystem-operator
  namespace: customer-operators
spec:
  interval: 60m0s
  sourceRef:
    kind: OCIRepository
    name: filesystem-operator
  targetNamespace: customer-operators
  path: ./
  prune: true
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      vast_api_ip: ${vast_api_ip:=192.0.2.0}
  patches:
    - patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: not-used
        spec:
          replicas: ${filesystem_operator_replicas:=0}
      target:
        kind: Deployment
        labelSelector: "app=filesystem-operator"
