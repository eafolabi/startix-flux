---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kamaji
  namespace: kamaji-system
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kamaji-system
  path: ./apps/kamaji/base
  prune: true
  wait: true
  timeout: 10m0s
