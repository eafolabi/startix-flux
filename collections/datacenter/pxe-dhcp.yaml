---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pxe-dhcp
  namespace: infra
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: infra
  path: ./apps/pxe-dhcp
  prune: true
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      pxe_dhcp_service_ip: ${pxe_dhcp_service_ip}
      kubedns_service_ip: ${kubedns_service_ip}
      ignition_server: ${ignition_server}
