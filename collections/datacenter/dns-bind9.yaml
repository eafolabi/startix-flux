---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dns-bind9-configs
  namespace: noc
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: noc
  path: ./apps/dns-bind9/configs
  prune: true
  wait: true
  timeout: 10m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substitute:
      environment: ${environment}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dns-bind9
  namespace: noc
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: noc
  path: ./apps/dns-bind9/base
  prune: true
  wait: true
  timeout: 10m0s
  dependsOn:
    - name: dns-bind9-configs
  postBuild:
    substitute:
      dns_service_ip: ${dns_service_ip:=192.0.2.0}
      environment: ${environment}
