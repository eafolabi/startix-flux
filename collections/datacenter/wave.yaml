---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wave
  namespace: wave
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: wave
  path: ./apps/wave/base
  prune: true
  wait: true
  timeout: 10m0s
