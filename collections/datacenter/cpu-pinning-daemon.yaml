---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: cpu-pinning-daemon
  namespace: infra
spec:
  interval: 60m0s
  url: oci://harbor.harbor/ghcr.io/gc-private/b2-docker-image-cpu-pinning-daemon/cpu-pinning-daemon-flux
  insecure: true
  ref:
    tag: ${cpu_pinning_daemon_flux:=0.1.0}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cpu-pinning-daemon
  namespace: infra
spec:
  interval: 60m0s
  sourceRef:
    kind: OCIRepository
    name: cpu-pinning-daemon
  targetNamespace: infra
  path: ./
  prune: true
  wait: true
  timeout: 10m0s
