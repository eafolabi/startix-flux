---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: smarter-device-manager
  namespace: infra
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: infra
  path: ./apps/smarter-device-manager
  prune: true
  wait: true
  timeout: 10m0s
