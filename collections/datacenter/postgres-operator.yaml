---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnpg-helmrelease
  namespace: kamaji-system
spec:
  interval: 60m0s
  path: ./apps/postgres-operator
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: kamaji-system
  prune: true
  wait: true
  timeout: 10m0s
