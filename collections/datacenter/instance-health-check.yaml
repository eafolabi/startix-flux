---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: instance-health-check
  namespace: monitoring
spec:
  interval: 60m0s
  url: oci://harbor.harbor/ghcr.io/gc-private/b2-docker-image-instance-health-check/instance-health-checker-flux
  insecure: true
  ref:
    tag: ${instance_health_check_flux:=0.2.2}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: instance-health-check
  namespace: monitoring
spec:
  interval: 60m0s
  sourceRef:
    kind: OCIRepository
    name: instance-health-check
  targetNamespace: monitoring
  path: ./
  prune: true
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      environment: ${environment}
      base_domain: ${base_domain}
