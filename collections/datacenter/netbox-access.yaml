---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: netbox-access
  namespace: infra
spec:
  interval: 60m0s
  url: oci://harbor.harbor/ghcr.io/gc-private/b2-netbox-access/b2-docker-image-netbox-access-flux
  insecure: true
  ref:
    tag: ${netbox_access_flux:=0.1.0}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbox-access
  namespace: infra
spec:
  interval: 60m0s
  sourceRef:
    kind: OCIRepository
    name: netbox-access
    namespace: infra
  targetNamespace: infra
  path: ./
  prune: true
  wait: true
  timeout: 10m0s
