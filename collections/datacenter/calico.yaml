---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: projectcalico
  namespace: flux-system
spec:
  interval: 30m
  url: https://projectcalico.docs.tigera.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calico
  namespace: flux-system
spec:
  targetNamespace: tigera-operator
  releaseName: calico
  interval: 60m
  chart:
    spec:
      chart: tigera-operator
      version: 3.26.3
      sourceRef:
        kind: HelmRepository
        name: projectcalico
        namespace: flux-system
      interval: 10m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    # Configuration to go into Install CRD for calico
    installation:
      flexVolumePath: /opt/libexec/kubernetes/kubelet-plugins/volume/exec/
      controlPlaneTolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
      calicoNetwork:
        nodeAddressAutodetectionV4:
          kubernetes: NodeInternalIP
    # Configuration for tigera-operator itself
    # removes default tolerations from the chart and adds the below
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        value: "true"
        effect: NoSchedule
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: calico-config
  namespace: calico-system
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: calico-system
  path: ./apps/calico-config/base
  prune: false
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      b2_service_network: ${b2_service_network}
