---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: pci-vfio-operator
  namespace: infra
spec:
  interval: 60m0s
  url: oci://harbor.harbor/ghcr.io/gc-private/b2-docker-image-pci-vfio-operator/b2-docker-image-pci-vfio-operator-flux
  insecure: true
  ref:
    tag: ${pci_vfio_operator_flux:=0.5.1}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pci-vfio-operator
  namespace: infra
spec:
  interval: 60m0s
  sourceRef:
    kind: OCIRepository
    name: pci-vfio-operator
    namespace: infra
  targetNamespace: infra
  path: ./
  prune: true
  wait: true
  timeout: 10m0s
