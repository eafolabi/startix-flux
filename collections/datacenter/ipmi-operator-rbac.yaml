# user was created by doing `sudo kubeadm kubeconfig user --client-name=ipmi-operator` on a control-plane-host
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ipmi-operator
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - list
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ipmi-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ipmi-operator
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: User
    name: ipmi-operator
