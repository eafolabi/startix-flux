---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: evpn-rr
  namespace: evpn
spec:
  interval: 60m0s
  url: oci://harbor.harbor/ghcr.io/gc-private/b2-docker-image-evpn-frr/evpn-frr-flux
  insecure: true
  ref:
    tag: ${evpn_frr_flux:=0.6.1}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: evpn-rr
  namespace: evpn
spec:
  interval: 60m0s
  sourceRef:
    kind: OCIRepository
    name: evpn-rr
  targetNamespace: evpn
  path: ./
  prune: true
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      app_name: "evpn-rr"
      cluster_ip: ${evpn_rr1_service_ip}

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: evpn-rr2
  namespace: evpn
spec:
  interval: 60m0s
  sourceRef:
    kind: OCIRepository
    name: evpn-rr
  targetNamespace: evpn
  path: ./
  prune: true
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      app_name: "evpn-rr2"
      cluster_ip: ${evpn_rr2_service_ip}
