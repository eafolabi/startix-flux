---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: postgres-cluster
  namespace: kamaji-system
spec:
  interval: 60m0s
  path: ./apps/postgres-cluster
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  targetNamespace: kamaji-system
  timeout: 10m0s
  dependsOn:
    - name: cnpg-helmrelease
