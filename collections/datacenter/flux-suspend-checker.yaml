---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: flux-suspend-checker
  namespace: flux-system
spec:
  interval: 60m0s
  url: oci://harbor.harbor/ghcr.io/gc-private/b2-docker-image-flux-suspend-checker/flux-suspend-checker-flux
  insecure: true
  ref:
    tag: ${flux_suspend_checker_flux:=0.1.3}
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-suspend-checker
  namespace: flux-system
spec:
  interval: 60m0s
  sourceRef:
    kind: OCIRepository
    name: flux-suspend-checker
  targetNamespace: flux-system
  path: ./
  prune: true
  wait: true
  timeout: 10m0s
