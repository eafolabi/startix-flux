---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: whereabouts
  namespace: flux-system
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./apps/whereabouts/base
  targetNamespace: kube-system
  prune: true
  wait: true
  timeout: 10m0s
  patches:
    - target:
        kind: DaemonSet
        name: whereabouts
        namespace: kube-system
      patch: |-
        apiVersion: apps/v1
        kind: DaemonSet
        metadata:
          name: whereabouts
          namespace: kube-system
        spec:
          template:
            spec:
              containers:
                - name: whereabouts
                  image: ghcr.io/gc-private/b2-whereabouts/whereabouts:0.1.0
                  env:
                    - name: WHEREABOUTS_IGNORED_POD_PREFIX
                      value: "ignore|"
