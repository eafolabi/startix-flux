---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: harbor
  path: ./apps/harbor/base
  prune: true
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      environment: ${environment}
      base_domain: ${base_domain}
      storageClass: standard
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: harbor-proxy-config
  namespace: harbor
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: harbor
  path: ./apps/harbor/proxy-config
  prune: true
  wait: true
  timeout: 10m0s
  dependsOn:
    - name: harbor
      namespace: harbor
  decryption:
    provider: sops
    secretRef:
      name: sops-age
