---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pypi-backup
  namespace: backup
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: backup
  path: ./apps/pypi-backup
  prune: true
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      environment: ${environment}
      pypi_backup_sc_name: ${pypi_backup_sc_name}
  dependsOn:
    - name: pypi-server
      namespace: pypi
    - name: etcd-backup
      namespace: backup
    - name: prometheus-base
      namespace: prometheus
