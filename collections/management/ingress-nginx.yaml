---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ingress-nginx
  namespace: ingress
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: ingress
  path: ./apps/ingress-nginx
  prune: true
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      core_router_anycast_ipv4: |
        []
      ingress_public: ${ingress_public}
