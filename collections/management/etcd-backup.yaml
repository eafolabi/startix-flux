---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: etcd-backup
  namespace: backup
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: backup
  path: ./apps/etcd-backup
  prune: true
  wait: true
  timeout: 10m0s
  postBuild:
    substitute:
      environment: ${environment}
      base_domain: ${base_domain}
      etcd_certs_location: ${etcd_certs_location}
      etcd_backup_sc_name: ${etcd_backup_sc_name}
  decryption:
    provider: sops
    secretRef:
      name: sops-age
