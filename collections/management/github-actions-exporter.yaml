---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: github-actions-exporter
  namespace: prometheus
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: prometheus
  path: ./apps/github-actions-exporter
  prune: true
  wait: true
  timeout: 10m0s
