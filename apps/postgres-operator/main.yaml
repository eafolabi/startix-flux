---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: cloudnative-pg
  namespace: kamaji-system
spec:
  url: https://cloudnative-pg.github.io/charts
  interval: 10m
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
  namespace: kamaji-system
spec:
  releaseName: cnpg
  chart:
    spec:
      chart: cloudnative-pg
      version: "0.24"
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: kamaji-system
  interval: 10m
  install:
    createNamespace: true
  values:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
