# yamllint disable
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/name: etcd-metrics
    app.kubernetes.io/part-of: kube-prometheus
  name: etcd-metrics
  namespace: prometheus
spec:
  endpoints:
  - port: metrics
    scheme: http
  jobLabel: component
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      app.kubernetes.io/component: etcd
