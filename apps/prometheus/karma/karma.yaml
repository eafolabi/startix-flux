---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karma
  namespace: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: karma
  template:
    metadata:
      labels:
        app: karma
        b2.genesiscloud.dev/allow-to-alertmanager: "true"
        b2.genesiscloud.dev/expose-to-ingress: "true"
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
      containers:
        - name: karma
          image: ghcr.io/prymitive/karma:v0.118
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 1000m
              memory: 1000Mi
          ports:
            - containerPort: 8080
          env:
            - name: CONFIG_FILE
              value: /config/karma.yaml
          volumeMounts:
            - name: configfile
              mountPath: /config
      volumes:
        - name: configfile
          configMap:
            name: karma
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: karma
  namespace: prometheus
data:
  karma.yaml: |
    filters:
      default:
        - "@state=active"
    alertAcknowledgement:
      enabled: true
    alertmanager:
      servers:
        - name: ours
          uri: http://alertmanager-operated:9093
          external_uri: https://alertmanager.${environment}.b2.${base_domain}
          proxy: true
    history:
      rewrite:
        - source: "https://prometheus.${environment}.b2.${base_domain}"
          uri: "http://prometheus-k8s:9090"
---
apiVersion: v1
kind: Service
metadata:
  name: karma
  namespace: prometheus
  labels:
    app: karma
spec:
  ports:
    - port: 8080
  selector:
    app: karma
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: karma
  namespace: prometheus
  annotations:
    nginx.ingress.kubernetes.io/auth-signin: https://oauth.${environment}.b2.${base_domain}/oauth2/start
    nginx.ingress.kubernetes.io/auth-url: http://oauth2-proxy.ingress.svc.cluster.local/oauth2/auth
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - karma.${environment}.b2.${base_domain}
  rules:
    - host: karma.${environment}.b2.${base_domain}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: karma
                port:
                  number: 8080
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-karma-to-prometheus
  namespace: prometheus
spec:
  selector: app == 'karma'
  types:
    - Egress
  egress:
    - action: Allow
      destination:
        services:
          namespace: prometheus
          name: prometheus-k8s
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-prometheus-from-karma
  namespace: prometheus
spec:
  selector: app.kubernetes.io/component == 'prometheus'
  types:
    - Ingress
  ingress:
    - action: Allow
      source:
        selector: app == 'karma'
