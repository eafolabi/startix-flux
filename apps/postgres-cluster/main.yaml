---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: postgres-selfsigned-issuer
  namespace: kamaji-system
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: server-ca
  namespace: kamaji-system
spec:
  isCA: true
  commonName: postgres-selfsigned-server-ca
  secretName: postgres-server-ca-key-pair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: postgres-selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: postgres-server-ca-issuer
  namespace: kamaji-system
spec:
  ca:
    secretName: postgres-server-ca-key-pair
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-server-cert
  namespace: kamaji-system
  labels:
    cnpg.io/reload: ""
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: postgres-server-cert
  namespace: kamaji-system
spec:
  secretName: postgres-server-cert
  usages:
    - server auth
  dnsNames:
    - kamaji-postgres-rw
    - kamaji-postgres-rw.kamaji-system
    - kamaji-postgres-rw.kamaji-system.svc
    - kamaji-postgres-r
    - kamaji-postgres-r.kamaji-system
    - kamaji-postgres-r.kamaji-system.svc
    - kamaji-postgres-ro
    - kamaji-postgres-ro.kamaji-system
    - kamaji-postgres-ro.kamaji-system.svc
  issuerRef:
    name: postgres-server-ca-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: client-ca
  namespace: kamaji-system
spec:
  isCA: true
  commonName: postgres-selfsigned-client-ca
  secretName: client-ca-key-pair
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: postgres-selfsigned-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: client-ca-issuer
  namespace: kamaji-system
spec:
  ca:
    secretName: client-ca-key-pair
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-client-cert
  namespace: kamaji-system
  labels:
    cnpg.io/reload: ""
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: postgres-client-cert
  namespace: kamaji-system
spec:
  secretName: postgres-client-cert
  usages:
    - client auth
  commonName: streaming_replica
  issuerRef:
    name: client-ca-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: v1
kind: Secret
metadata:
  name: kamaji-postgres-client-cert
  namespace: kamaji-system
  labels:
    cnpg.io/reload: ""
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kamaji-postgres-client-cert
  namespace: kamaji-system
spec:
  secretName: kamaji-postgres-client-cert
  usages:
    - client auth
  commonName: kamaji
  issuerRef:
    name: client-ca-issuer
    kind: Issuer
    group: cert-manager.io
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kamaji-postgres
  namespace: kamaji-system
spec:
  instances: 3
  certificates:
    serverTLSSecret: postgres-server-cert
    serverCASecret: postgres-server-cert
    clientCASecret: postgres-client-cert
    replicationTLSSecret: postgres-client-cert
  postgresql:
    pg_hba:
      - hostssl kamaji all all cert clientcert=verify-full
  bootstrap:
    initdb:
      database: kamaji
      postInitApplicationSQL:
        - ALTER USER kamaji CREATEDB CREATEROLE SUPERUSER;
  storage:
    size: 10Gi
    storageClass: replicated2
  affinity:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
