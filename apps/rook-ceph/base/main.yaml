---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  interval: 30m
  url: https://charts.rook.io/release
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  targetNamespace: rook-ceph
  releaseName: rook-ceph
  interval: 5m
  chart:
    spec:
      chart: rook-ceph
      sourceRef:
        kind: HelmRepository
        name: rook-ceph
        namespace: rook-ceph
      interval: 1m
      version: v1.17.6
  values:
    monitoring:
      enabled: true
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
    discover:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
    cephCommandsTimeoutSeconds: "60"
    enableDiscoveryDaemon: true
    csi:
      provisionerTolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
      pluginTolerations:
        - key: gpu-host
          operator: Exists
        - key: cpu-host
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
      rbdPluginTolerations:
        - key: gpu-host
          operator: Exists
        - key: cpu-host
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
      cephFSPluginTolerations:
        - key: gpu-host
          operator: Exists
        - key: cpu-host
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
      csiRBDPluginResource: |
        - name : csi-rbdplugin
          resource:
            requests:
              cpu: 300m
              memory: 128Mi
            limits:
              cpu: 600m
              memory: 256Mi
      csiCephFSPluginResource: |
        - name : csi-cephfsplugin
          resource:
            requests:
              cpu: 300m
              memory: 128Mi
            limits:
              cpu: 600m
              memory: 256Mi
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: rook-ceph-operator
                namespace: rook-ceph
              spec:
                template:
                  metadata:
                    labels:
                      b2.genesiscloud.dev/expose-to-apiserver: 'true'
