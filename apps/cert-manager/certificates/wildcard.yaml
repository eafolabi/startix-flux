---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: env-certificate
spec:
  # Secret names are always required.
  secretName: env-certificate-secret
  issuerRef:
    name: letsencrypt-dns01-cloudflare
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  commonName: "*.${environment}.b2.${base_domain}"
  dnsNames:
    - "*.${environment}.b2.${base_domain}"
