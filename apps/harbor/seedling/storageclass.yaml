---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
  name: local-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
  name: data-harbor-redis-0
spec:
  storageClassName: "local-storage"
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/srv/data-harbor-redis-0"
  claimRef:
    namespace: harbor
    name: data-harbor-redis-0
---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
  name: database-data-harbor-database-0
spec:
  storageClassName: "local-storage"
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/srv/database-data-harbor-database-0"
  claimRef:
    namespace: harbor
    name: database-data-harbor-database-0
---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
  name: harbor-jobservice
spec:
  storageClassName: "local-storage"
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/srv/harbor-jobservice"
  claimRef:
    namespace: harbor
    name: harbor-jobservice
---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: IfNotPresent
  name: harbor-registry
spec:
  storageClassName: "local-storage"
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/srv/harbor-registry"
  claimRef:
    namespace: harbor
    name: harbor-registry
