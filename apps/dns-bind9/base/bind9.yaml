---
apiVersion: v1
kind: Service
metadata:
  name: dns-bind9
  labels:
    app: dns-bind9
spec:
  clusterIP: ${dns_service_ip}
  selector:
    app: dns-bind9
  ports:
    - protocol: TCP
      port: 53
      targetPort: 53
      name: dns-bind9-tcp
    - protocol: UDP
      port: 53
      targetPort: 53
      name: dns-bind9-udp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-bind9
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dns-bind9
  template:
    metadata:
      labels:
        app: dns-bind9
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: dns-bind9
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      containers:
        - name: bind9
          image: ubuntu/bind9:9.18-22.04_beta
          command:
            - bash
            - -eEuc
            - |
                # Reload bind9 if a zone changes, monitor every 15 minutes
                while :; do TERM=linux watch -tgn $((15*60)) "sha1sum /etc/bind/db.*" >/dev/null; rndc reload; done &
                # image default entrypoint.sh
                /usr/local/bin/docker-entrypoint.sh
          env:
          ports:
            - containerPort: 53
              protocol: TCP
            - containerPort: 53
              protocol: UDP
          volumeMounts:
            - name: cfgs
              mountPath: "/etc/bind"
      volumes:
        - name: cfgs
          projected:
            sources:
              - configMap:
                  name: dns-bind9-config
              - configMap:
                  name: b2-gcdev-zones
              - secret:
                  name: rndc-config
---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-ingress-coredns-to-bind9-udp
spec:
  selector: app == "dns-bind9"
  types:
    - Ingress
  ingress:
    - action: Allow
      protocol: UDP
      source:
        selector: k8s-app == "coredns"
        namespaceSelector: kubernetes.io/metadata.name == "kube-system"
      destination:
        ports:
          - 53
    - action: Allow
      protocol: TCP
      source:
        selector: k8s-app == "coredns"
        namespaceSelector: kubernetes.io/metadata.name == "kube-system"
      destination:
        ports:
          - 53
