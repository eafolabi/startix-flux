---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: ingress
spec:
  interval: 30m
  url: https://kubernetes.github.io/ingress-nginx
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress
spec:
  targetNamespace: ingress
  releaseName: ingress-nginx
  interval: 5m
  chart:
    spec:
      chart: ingress-nginx
      version: 4.12.1
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: ingress
      interval: 1m
  values:
    controller:
      kind: DaemonSet
      podLabels:
        b2.genesiscloud.dev/expose-to-apiserver: 'true'
        b2.genesiscloud.dev/allow-to-apiserver: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
      admissionWebhooks:
        patch:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
          labels:
            b2.genesiscloud.dev/allow-to-apiserver: "true"
      service:
        externalTrafficPolicy: Local
        type: NodePort
        clusterIP: ${ingress_http_private/X/0}
        externalIPs:
          - ${ingress_public}
      extraArgs:
        default-ssl-certificate: ingress/env-certificate-secret
        enable-ssl-passthrough: true
      allowSnippetAnnotations: true
      config:
        use-http2: "false"
        annotations-risk-level: Critical
      sysctls:
        "net.ipv4.tcp_congestion_control": "bbr"
