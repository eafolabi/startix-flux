---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: kafka
spec:
  interval: 30m
  url: https://strimzi.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka
spec:
  targetNamespace: kafka-system
  releaseName: kafka-operator
  interval: 60m
  chart:
    spec:
      chart: strimzi-kafka-operator
      version: "0.33.2"
      sourceRef:
        kind: HelmRepository
        name: kafka
        namespace: kafka-system
      interval: 10m
  values:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
    watchNamespaces:
      - northbound-api
    generateNetworkPolicy: false
    labels:
      b2.genesiscloud.dev/allow-to-apiserver: "true"
