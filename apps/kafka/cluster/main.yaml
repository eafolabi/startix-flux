---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka
spec:
  kafka:
    version: 3.4.0
    replicas: 3
    listeners:
      - name: tls
        port: 9092
        type: internal
        tls: true
        authentication:
          type: tls
      - name: external
        port: 9093
        type: ingress
        tls: true
        authentication:
          type: tls
        configuration:
          bootstrap:
            host: kafka.${environment}.b2.${base_domain}
          brokers:
            - broker: 0
              host: kafka-0.${environment}.b2.${base_domain}
            - broker: 1
              host: kafka-1.${environment}.b2.${base_domain}
            - broker: 2
              host: kafka-2.${environment}.b2.${base_domain}
          class: nginx
    authorization:
      type: simple
      superUsers:
        - CN=kafka-admin
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      inter.broker.protocol.version: "3.4"
    storage:
      type: jbod
      volumes:
        - id: 0
          type: persistent-claim
          size: 2Gi
          class: replicated2
          deleteClaim: false
    template:
      pod:
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
        metadata:
          labels:
            b2.genesiscloud.dev/expose-to-ingress: "true"
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 2Gi
      class: replicated2
      deleteClaim: false
    template:
      pod:
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
  entityOperator:
    topicOperator: {}
    userOperator: {}
    template:
      pod:
        metadata:
          labels:
            b2.genesiscloud.dev/allow-to-apiserver: "true"
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
---
apiVersion: kafka.strimzi.io/v1alpha1
kind: KafkaUser
metadata:
  name: kafka-admin
  namespace: northbound-api
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls: []
---
apiVersion: kafka.strimzi.io/v1alpha1
kind: KafkaUser
metadata:
  name: event-sender
  namespace: northbound-api
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          patternType: prefix
          name: b2.api.
        operations:
          - Read
          - Write
          - Describe
          - Create
      - resource:
          type: group
          patternType: prefix
          name: event-sender.
        operations:
          - Read
---
apiVersion: kafka.strimzi.io/v1alpha1
kind: KafkaUser
metadata:
  name: event-client
  namespace: northbound-api
  labels:
    strimzi.io/cluster: kafka
spec:
  authentication:
    type: tls
  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          patternType: prefix
          name: b2.api.
        operations:
          - Read
          - Describe
      - resource:
          type: group
          patternType: prefix
          name: event-client.
        operations:
          - Read
