  infradev_librenms_ip: 10.9.9.17
  infradev_flowmon_ip: 10.9.9.19
  public_dns_zones: instance.euc-de-muc-1.genesiscloudusercontent.com. 207.189.147.in-addr.arpa. 0.7.0.0.7.9.0.a.2.ip6.arpa. euc-de-muc-1.gciprd.com.
  akvorado_service_ip: 10.7.0.81

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeadm-config
  namespace: kube-system
data:
  ClusterConfiguration: |
    apiVersion: kubeadm.k8s.io/v1beta3
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        authorization-mode: Node,RBAC
        feature-gates: APIServerTracing=true
        tracing-config-file: /cfg/apiserver-tracing.yaml
      extraVolumes:
        - name: tracingcfg
          hostPath: /opt/apiserver-tracing.yaml
          mountPath: /cfg/apiserver-tracing.yaml
          readOnly: true
          pathType: File
      timeoutForControlPlane: 4m0s
    certificatesDir: /etc/kubernetes/pki
    clusterName: kubernetes
    controlPlaneEndpoint: 10.8.2.1:443
    controllerManager:
      extraArgs:
        bind-address: 0.0.0.0
      extraVolumes:
        - name: flexvolume-dir
          hostPath: /opt/kubernetes/kubelet-plugins/volume/exec
          mountPath: /usr/libexec/kubernetes/kubelet-plugins/volume/exec
          pathType: DirectoryOrCreate
    dns: {}
    etcd:
      local:
        dataDir: /var/lib/etcd
        extraArgs:
          listen-metrics-urls: http://0.0.0.0:2381
          auto-compaction-mode: periodic
          auto-compaction-retention: 15m
    imageRepository: registry.k8s.io
    kubernetesVersion: v1.29.8
    networking:
      dnsDomain: cluster.local
      podSubnet: 10.6.0.0/16
      serviceSubnet: 10.7.0.0/16
    scheduler:
      extraArgs:
        bind-address: 0.0.0.0
        config: /cfg/schedulerconfig.yaml
      extraVolumes:
        - name: cfg
          hostPath: /opt/schedulerconfig.yaml
          mountPath: /cfg/schedulerconfig.yaml
          readOnly: true
          pathType: File
---
apiVersion: v1
kind: Namespace
metadata:
  name: e2e-tests
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: instance-specs
  namespace: e2e-tests
data:
  LOG_LEVEL: INFO
  cpu_nr: "4"
  ram_gb: "12"
  accel_type: habana.ai/gaudi2
