---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: datacenter-collection
  namespace: flux-system
spec:
  interval: 60m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: ./collections/datacenter
  prune: false
  wait: true
  timeout: 10m0s
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
      - kind: ConfigMap
        name: version-registry
        optional: true
      - kind: ConfigMap
        name: grafana-configuration
        optional: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  patches:
  # Disable inventory sync for the time being
  - patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: ignition-server
        namespace: infra
      spec:
        patches:
        - patch: |-
            apiVersion: batch/v1
            kind: CronJob
            metadata:
              name: inventory-sync
            spec:
              suspend: true
  # Lower replica count on replicated2 so we use less space
  # Duplicate storage nodes as patches[] is not merged otherwise
  - patch: |-
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: rook-ceph-cluster
        namespace: rook-ceph
      spec:
        patches:
        - patch: |-
            apiVersion: ceph.rook.io/v1
            kind: CephBlockPool
            metadata:
              name: replicated2
              namespace: rook-ceph
            spec:
              replicated:
                size: 2
        - target:
            kind: CephCluster
            name: rook-ceph
            namespace: rook-ceph
          patch: |-
            apiVersion: ceph.rook.io/v1
            kind: CephCluster
            metadata:
              name: rook-ceph
              namespace: rook-ceph
            spec:
              storage:
                nodes: ${rook_ceph_nodes}
